<!--Rowspan-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowspan</title>
</head>
<body>
    <h1>Rowspan:</h1>
    <p>Rowspan combines two or more rows into one cell.</p>

    <table border="1">
        <tr>
        <th>Name</th>
        <th>Contact</th>
        </tr>

        <tr>
            <td rowspan="2">Carol</td>
            <td>carol@gmail.com</td>
        </tr>

        <tr>
        <td >carol1@gmail.com</td>
        </tr>
        
    </table>
</body>
</html>
