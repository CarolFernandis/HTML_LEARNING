<!--Colspan-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colspan table</title>
</head>
<body>
    <h2>Colspan: This combines two or more columns into one cell.</h2>
            <table border="1">
                <tr>
                    <th>Name</th>
                    <th colspan="2">Age And Contact</th>
                </tr>

                <tr>
                    <td>Carol</td>
                    <td>20</td>
                    <td>9922442178</td>
                </tr>
            </table>
</body>
</html>
