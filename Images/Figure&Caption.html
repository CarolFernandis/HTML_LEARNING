<!--FIGURE & CAPTION-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>figure&caption</title>
</head>
<body>
    <h1>FIGURE & CAPTION</h1>
    <p>The figure element groups an image with its caption.</p>
    <p>The figcaption tag adds a description below or above the image.</p>

    <figure>
        <img src="https://tse1.mm.bing.net/th/id/OIP.nSqEBtSX4WYUFPIf0qPLIAHaEK?r=0&pid=Api&P=0&h=180" alt="Image" width="350">
        <figcaption>Beautiful View</figcaption>
    </figure>
</body>
</html>
