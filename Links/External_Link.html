<!--External link-->

<!DOCTYPE html>
<html>
    <head>
        <title>External Link Example</title>
    </head>
    <body>
        <h2>External Link Example:</h2>
        <a href="https://www.google.com">Visit Google</a>

        <h2>Open External Link in New Tab</h2>
        <a href="https://www.youtube.com " target="_blank">Visit Youtube</a>

        <h2>External Link with Tooltip</h2>
        <a href="https://www.github.com" target="_blank" title="Visit GitHub">Open GitHub</a>

        <h2>Secure External Link</h2>
        <a href="https://www.google.com" target="_blank" rel="noopener noreferrer">Visit Google</a>
        
    </body>
</html>
