<!--Date and Time in HTML-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date&Time</title>
</head>
<body>
    <H1>Example 1 of Date and time</H1>
    <p>Exam Date:
        <time datetime="2026-07-1">July 1, 2026</time>
    </p>
    <br>

    <H1>Example 2 of Date and time</H1>
    <p>Exam Date:
        <time datetime="14:30">2:30</time>
    </p>

</body>
</html>
