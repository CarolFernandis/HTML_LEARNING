<!--Nested List - You can put a list inside another list-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NestedList</title>
</head>
<body>
    <h1>Nested List:</h1>
    <ul>
        <li>Fruits:</li>
        <ul>
            <li>Apple</li>
            <li>Banana</li>
        </ul>
        <li>Vegetables</li>
    </ul>
</body>
</html>
