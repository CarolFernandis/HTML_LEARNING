<!--Mixed List - You can combine <ol> and <ul> together.-->

    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mixed List</title>
    </head>
    <body>
        <h!>Mixed List:</h>
        <ol>
            <li>Frontend</li>
            <ul>
                <li>HTML</li>
                <li>Css</li>
            </ul>
            <li>Backend</li>
            <ul>
                <li>Python</li>
                <li>Java</li>
            </ul>
        </ol>
    </body>
    </html>
