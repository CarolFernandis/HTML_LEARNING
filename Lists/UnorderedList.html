<!--UnOrdered List in HTML-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>--UnorderedList</title>
</head>
<>
    <h1>Unordered List: Default</h1>
    <ul>
        <li>Anjelin</li>
        <li>Benjamin</li>
    </ul>

    <hr>

    <h1>Unordered List: Circle</h1>
    <ul typt="circle">
        <li>Laptop</li>
        <li>Phone</li>
    </ul>

    <hr>

    <h1>Unordered List: Square</h1>
    <ul type="square">
        <li>Book</li>
        <li>Pen</li>
    </ul>

    <hr>

    <h1>Unordered List: No Bullets</h1>
    <ul type="none">
        <li>HTML</li>
        <li>Java</li>
    </ul>
    
    <hr>
</body>
</html>
