<!--Custom List - Developers sometimes creates lists without 
<ul> or <ol>. They use <div>, <section> or <article>. -->

    <!DOCTYPE html>
    <html lang="en">
    <head>
        <style>
            .list-item {
                background: #f8cfcf;
                padding: 12px;
                margin: 8px 0;
                border-radius: 8px;
                font-family: Arial;
            }
        </style>
    </head>
    <body>
        <div class="list-item">Learn HTML Basics</div>
        <div class="list-item">Learn Css Basics</div>
        <div class="list-item">Learn Javascript Basics</div>

    </body>
    </html>
